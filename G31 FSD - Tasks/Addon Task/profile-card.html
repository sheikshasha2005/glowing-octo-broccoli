<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusinessApp | Profile Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-DBjhmceDfFBlTi8dB0Zng5U3M6U7nTRjQji1VVKzzZaTptOzlnQhoO7HQNkKJcMc" crossorigin="anonymous" />

  <style>
    :root {
      --card-bg: #ffffff;
      --accent: #1d70ff;
      --accent-soft: rgba(29, 112, 255, 0.12);
      --text-primary: #10233b;
      --text-secondary: #627491;
      --shadow: 0 22px 52px rgba(16, 35, 59, 0.13);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef4fc;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
    }

    .profile-card {
      width: 100%;
      max-width: 380px;
      background: var(--card-bg);
      border-radius: 1.75rem;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .profile-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 32px 72px rgba(16, 35, 59, 0.18);
    }

    .profile-header {
      background: linear-gradient(135deg, #4c7ef5 0%, #1ab7ff 100%);
      height: 140px;
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 6px solid #ffffff;
      object-fit: cover;
      margin-top: -60px;
      transition: transform 0.3s ease;
    }

    .profile-avatar:hover {
      transform: scale(1.03);
    }

    .card-body {
      padding: 2rem 1.8rem 2.4rem;
      text-align: center;
    }

    .profile-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .profile-role {
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .profile-bio {
      color: #5b6d8c;
      line-height: 1.75;
      margin-bottom: 1.8rem;
    }

    .btn-follow {
      padding: 0.85rem 1.75rem;
      border-radius: 2rem;
      background: var(--accent);
      border: none;
      color: #ffffff;
      font-weight: 600;
      transition: background 0.25s ease, transform 0.25s ease;
    }

    .btn-follow:hover,
    .btn-follow:focus {
      background: #0c5ae9;
      transform: translateY(-2px);
    }

    @media (max-width: 576px) {
      .profile-card {
        margin: 1.5rem;
      }

      .card-body {
        padding: 1.6rem 1.4rem 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Professional Profile Card Design -->
  <div class="profile-card">
    <div class="profile-header"></div>
    <div class="card-body">
      <img src="https://via.placeholder.com/240.png?text=Avatar" alt="Profile avatar" class="profile-avatar" />
      <h2 class="profile-name mt-3">Alex Morgan</h2>
      <p class="profile-role">Senior Product Manager</p>
      <p class="profile-bio">Experienced leader focused on modernizing enterprise workflows, optimizing user experiences, and delivering measurable business results.</p>
      <button class="btn btn-follow">Follow</button>
    </div>
  </div>
</body>
</html>
