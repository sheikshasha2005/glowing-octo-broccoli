<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusinessApp | Hero Section</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-DBjhmceDfFBlTi8dB0Zng5U3M6U7nTRjQji1VVKzzZaTptOzlnQhoO7HQNkKJcMc" crossorigin="anonymous" />

  <style>
    :root {
      --gradient-start: #0f4c92;
      --gradient-end: #1dc8f5;
      --hero-bg: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      --card-bg: rgba(255, 255, 255, 0.92);
      --title-color: #ffffff;
      --text-color: #edf1fb;
      --button-primary: #ffb703;
      --button-secondary: #ffffff;
      --shadow: 0 24px 58px rgba(13, 61, 122, 0.16);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--hero-bg);
      color: var(--title-color);
    }

    .hero-section {
      padding: 4rem 0;
    }

    .hero-card {
      background: var(--card-bg);
      border-radius: 1.5rem;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .hero-card:hover {
      transform: translateY(-10px);
    }

    .hero-title {
      font-size: clamp(2.5rem, 4vw, 4rem);
      font-weight: 700;
      line-height: 1.05;
      color: #10233b;
    }

    .hero-description {
      color: #4d5e7d;
      font-size: 1rem;
      line-height: 1.8;
    }

    .btn-primary-custom {
      background: var(--button-primary);
      border: none;
      color: #10233b;
      font-weight: 600;
      border-radius: 2rem;
      padding: 0.85rem 1.8rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .btn-primary-custom:hover,
    .btn-primary-custom:focus {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(255, 183, 3, 0.3);
      background: #f5a903;
    }

    .btn-secondary-custom {
      background: transparent;
      border: 1px solid rgba(16, 35, 59, 0.18);
      color: #10233b;
      border-radius: 2rem;
      padding: 0.85rem 1.8rem;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .btn-secondary-custom:hover,
    .btn-secondary-custom:focus {
      background: #10233b;
      color: #ffffff;
      border-color: transparent;
    }

    .hero-image {
      width: 100%;
      border-radius: 1.25rem;
      box-shadow: 0 24px 48px rgba(16, 35, 59, 0.16);
    }

    @media (max-width: 767px) {
      .hero-section {
        padding: 3rem 0;
      }

      .hero-card {
        border-radius: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <!-- Hero CTA Section for BusinessApp -->
  <section class="hero-section">
    <div class="container">
      <div class="hero-card p-4 p-lg-5">
        <div class="row align-items-center g-4">
          <div class="col-lg-6">
            <div class="mb-4">
              <span class="badge rounded-pill bg-warning-subtle text-warning px-3 py-2">Business Growth</span>
            </div>
            <h1 class="hero-title">Empower your team with intelligent digital workflows.</h1>
            <p class="hero-description mt-4">Create a modern business presence with a polished landing experience that speaks clearly, builds trust, and converts visitors into engaged clients.</p>
            <div class="d-flex flex-column flex-sm-row gap-3 mt-4">
              <a href="#" class="btn btn-primary-custom">Get Started</a>
              <a href="#" class="btn btn-secondary-custom">Learn More</a>
            </div>
          </div>
          <div class="col-lg-6">
            <img src="https://via.placeholder.com/760x520.png?text=Business+Solution+Illustration" alt="Business solution illustration" class="hero-image" />
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
