<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusinessApp | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-DBjhmceDfFBlTi8dB0Zng5U3M6U7nTRjQji1VVKzzZaTptOzlnQhoO7HQNkKJcMc" crossorigin="anonymous" />

  <style>
    :root {
      --background: #eef4fb;
      --card-bg: #ffffff;
      --primary: #1f4b8b;
      --primary-soft: #e2ebfa;
      --accent: #ff7a00;
      --text: #1f2d48;
      --shadow: 0 24px 60px rgba(31, 75, 139, 0.12);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--background);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border-radius: 1.5rem;
      box-shadow: var(--shadow);
      padding: 2rem;
      border: 1px solid rgba(31, 75, 139, 0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 32px 70px rgba(31, 75, 139, 0.16);
    }

    .form-control {
      border-radius: 1rem;
      border: 1px solid rgba(31, 75, 139, 0.18);
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 0.2rem rgba(31, 75, 139, 0.12);
    }

    .btn-login {
      border-radius: 1.25rem;
      padding: 0.9rem 1.3rem;
      font-weight: 600;
      background: var(--accent);
      border: none;
      color: #ffffff;
      transition: background 0.25s ease, transform 0.25s ease;
    }

    .btn-login:hover,
    .btn-login:focus {
      background: #e66c00;
      transform: translateY(-2px);
    }

    .text-link {
      color: var(--primary);
      text-decoration: none;
      transition: color 0.25s ease;
    }

    .text-link:hover,
    .text-link:focus {
      color: var(--accent);
      text-decoration: underline;
    }

    .login-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .login-subtitle {
      color: #4a5b7d;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 576px) {
      body {
        padding: 1.5rem;
      }

      .login-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Centered Login Form with Business Styling -->
  <main class="login-card">
    <div class="text-center mb-4">
      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to access your dashboard and stay productive.</p>
    </div>
    <form>
      <div class="mb-3">
        <label for="emailInput" class="form-label">Email address</label>
        <input type="email" class="form-control" id="emailInput" placeholder="name@company.com" required />
      </div>
      <div class="mb-3">
        <label for="passwordInput" class="form-label">Password</label>
        <input type="password" class="form-control" id="passwordInput" placeholder="Enter your password" required />
      </div>
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" value="" id="rememberCheck" />
          <label class="form-check-label" for="rememberCheck">Remember me</label>
        </div>
        <a href="#" class="text-link">Forgot password?</a>
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-login">Login</button>
      </div>
    </form>
  </main>
</body>
</html>
