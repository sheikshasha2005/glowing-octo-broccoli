<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BusinessApp | Navbar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-DBjhmceDfFBlTi8dB0Zng5U3M6U7nTRjQji1VVKzzZaTptOzlnQhoO7HQNkKJcMc" crossorigin="anonymous" />

  <style>
    :root {
      --bg-color: #f8fbff;
      --nav-color: #1f3c88;
      --nav-hover: #0f2a6f;
      --button-bg: #ff7a00;
      --button-hover: #e46a00;
      --button-text: #ffffff;
      --shadow: 0 16px 40px rgba(20, 44, 89, 0.12);
    }

    body {
      background: var(--bg-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .navbar-custom {
      background: #ffffff;
      box-shadow: var(--shadow);
      border-radius: 1rem;
      padding: 1rem 1.25rem;
    }

    .navbar-brand {
      color: var(--nav-color);
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: transform 0.25s ease, color 0.25s ease;
    }

    .navbar-brand:hover,
    .nav-link:hover,
    .nav-link:focus {
      color: var(--button-bg);
      transform: translateY(-1px);
    }

    .nav-link {
      color: #33415b;
      transition: color 0.25s ease, transform 0.25s ease;
    }

    .btn-login {
      background: var(--button-bg);
      color: var(--button-text);
      border-radius: 3rem;
      padding: 0.65rem 1.35rem;
      transition: background 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
    }

    .btn-login:hover,
    .btn-login:focus {
      background: var(--button-hover);
      box-shadow: 0 14px 24px rgba(255, 122, 0, 0.25);
      transform: translateY(-2px);
      color: #fff;
    }

    .nav-decoration {
      border-top: 1px solid rgba(47, 79, 136, 0.08);
      margin-top: 1.5rem;
    }

    @media (max-width: 767px) {
      .navbar-custom {
        padding: 0.9rem 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Responsive Business Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-light navbar-custom">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">BusinessApp</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu" aria-controls="navbarMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMenu">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Services</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Contact</a>
          </li>
        </ul>
        <div class="d-flex mt-3 mt-lg-0">
          <a class="btn btn-login" href="#">Login</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container mt-5 pt-3">
    <div class="row justify-content-center">
      <div class="col-lg-10 text-center">
        <p class="text-muted">A premium navigation experience designed for modern business applications with clear structure, strong hierarchy, and polished details.</p>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS is intentionally omitted as JavaScript is not allowed in this task -->
</body>
</html>
